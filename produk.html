<!doctypehtml><html lang=id><meta charset=UTF-8><meta content="width=device-width,initial-scale=1"name=viewport><title>Katalog Affiliate Pro</title><style>:root{--bg:#f2f2f7;--card:#ffffff;--accent:#007aff;--shopee:#ee4d2d;--tiktok:#010101;--text:#1c1c1e;--secondary-text:#8e8e93}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background-color:var(--bg);margin:0;padding:0;color:var(--text)}header{padding:30px 20px 10px;text-align:center}header h1{font-size:24px;font-weight:800;margin:0;color:var(--accent)}header p{color:var(--secondary-text);font-size:14px;margin-top:5px}.search-container{position:sticky;top:0;z-index:100;padding:15px 20px;background:rgba(242,242,247,.8);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}.search-wrapper{background:#e5e5ea;border-radius:14px;display:flex;align-items:center;padding:0 15px}.search-wrapper input{width:100%;padding:12px 5px;border:none;background:0 0;font-size:16px;outline:0}#catalog{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:10px 20px 100px}.card{background:var(--card);border-radius:20px;padding:15px;display:flex;flex-direction:column;box-shadow:0 4px 15px rgba(0,0,0,.05);transition:transform .2s}.card:active{transform:scale(.95)}.no-badge{font-size:11px;font-weight:800;color:var(--accent);background:rgba(0,122,255,.1);padding:4px 10px;border-radius:8px;align-self:flex-start;margin-bottom:10px}.product-name{font-size:14px;font-weight:600;margin-bottom:15px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;height:40px;line-height:1.4}.btn-group{display:flex;gap:8px;margin-top:auto}.btn-link{flex:1;text-align:center;text-decoration:none;font-size:12px;font-weight:700;color:#fff;padding:10px 0;border-radius:10px}.shopee{background-color:var(--shopee)}.tiktok{background-color:var(--tiktok)}#loading{text-align:center;padding:50px;color:var(--secondary-text);font-weight:500}</style><header><h1>Katalog Affiliate Aing✨</h1><p>Cari nomor produk sesuai video TikTok</header><div class=search-container><div class=search-wrapper><input id=searchInput onkeyup=searchProduct() placeholder="Cari nomor produk..."type=number></div></div><div id=loading>Sedang menyinkronkan data...</div><div id=catalog></div><script>let allData=[];const sheetID="1OEL3-Ain_ISVqLpWu6bq3WrtpgbtvPa1HdfM7haUHIQ",url=`https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:csv`;async function fetchKatalog(){try{const t=await fetch(url),e=await t.text(),a=e.split("\n");allData=a.map(t=>{const e=t.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(t=>t.replace(/"/g,""));t=e[0]?e[0].trim():"";return t&&!isNaN(t)?{no:t,nama:e[1]?e[1].trim():"Produk Tanpa Nama",shopee:e[2]?e[2].trim():"",tiktok:e[3]?e[3].trim():""}:null}).filter(t=>null!==t),document.getElementById("loading").style.display="none",renderProducts(allData)}catch(t){document.getElementById("loading").innerText="Koneksi gagal. Cek akses Google Sheets Akang.",console.error("Error:",t)}}function renderProducts(t){const e=document.getElementById("catalog");0!==t.length?e.innerHTML=t.map(t=>`
                <div class="card">
                    <span class="no-badge">#${t.no}</span>
                    <div class="product-name">${t.nama}</div>
                    <div class="btn-group">
                        ${t.shopee?`<a href="${t.shopee}" class="btn-link shopee" target="_blank">Shopee</a>`:""}
                        ${t.tiktok?`<a href="${t.tiktok}" class="btn-link tiktok" target="_blank">TikTok</a>`:""}
                    </div>
                </div>
            `).join(""):e.innerHTML='<div style="grid-column: span 2; text-align: center; color: #8e8e93; padding: 20px;">Produk tidak ditemukan.</div>'}function searchProduct(){const e=document.getElementById("searchInput").value;e?renderProducts(allData.filter(t=>t.no.includes(e))):renderProducts(allData)}fetchKatalog()</script>
